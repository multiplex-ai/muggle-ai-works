name: Publish MCP to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.1)"
        required: true
        type: string

env:
  # Opt into Node.js 22 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Use environment for secrets isolation
    environment: npm-publish
    permissions:
      contents: read
      id-token: write  # Required for npm provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: extract_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version (tag trigger)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version ${{ steps.extract_version.outputs.version }} --no-git-tag-version

      - name: Update package.json version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Publish to npm (with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: publish
    if: failure()
    steps:
      - name: Notify failure
        run: echo "MCP publish failed. Check the workflow logs."
