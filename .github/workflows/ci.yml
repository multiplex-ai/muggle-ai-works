name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

  # Guards the Python eval harness (skill-routing-eval). Pure stdlib unittest,
  # no Claude calls, so it runs on every PR without the LLM evals' flake/cost.
  harness-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run harness unit tests
        run: python -m unittest discover -s internal/skill-routing-eval -p "test_*.py" -v

  # Enforces the one-way skill dependency rule (plugin/skills/CLAUDE.md).
  # Zero-dep Node script, so no install step — catches reverse dependencies
  # in PRs from any agent, including ones the local PreToolUse hook never sees.
  skill-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check skill dependency direction
        run: node scripts/check-skill-deps.mjs

  # Type check with different TypeScript versions
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        typescript: ["5.5", "5.6", "5.7"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install TypeScript ${{ matrix.typescript }}
        run: pnpm add -Dw typescript@${{ matrix.typescript }}

      - name: Type check
        run: npx tsc --noEmit

  # Test on multiple Node.js versions
  node-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22", "23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

  # Test on multiple platforms
  platform-compat:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

  # Verify plugin manifests and compatibility contracts
  verify-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify plugin manifests
        run: pnpm run verify:plugin

      - name: Verify compatibility contracts
        run: pnpm run verify:contracts

      - name: Smoke-test the built CLI
        run: pnpm run smoke:cli
