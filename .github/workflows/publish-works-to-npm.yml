name: Publish Works to npm

# -----------------------------------------------------------------------------
# If you rename this file or change the workflow `name:` above, publishing may
# silently fail (e.g. ENEEDAUTH) until auth is updated elsewhere:
# - npmjs.com → package → Access → Trusted Publishing / automation: the allowed
#   GitHub workflow is often tied to the workflow *filename* (and sometimes
#   display name). Update it to match after a rename.
# - GitHub → Settings → Environments → `npm-publish`: confirm `NPM_TOKEN` (or
#   OIDC-only setup) still applies; environment rules are per-repo, but any
#   external docs or runbooks that reference the old workflow path need updating.
# - Do not remove the publish job step that activates npm 11.x (see that job below).
#   Node 22 images ship npm 10.x; trusted publishing / OIDC needs npm >= 11.5.1.
#   Do not switch back to `npm install -g npm`—it can fail on ubuntu-latest + Node 22
#   (MODULE_NOT_FOUND / promise-retry). Use Corepack to activate npm 11.5.1 instead.
#   See: https://docs.npmjs.com/trusted-publishers
# -----------------------------------------------------------------------------

run-name: >-
  Publish Works to npm (
  ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name
  || (github.event_name == 'workflow_dispatch' && inputs.version != '' && inputs.version)
  || (github.event_name == 'workflow_dispatch' && format('manual-{0}', inputs.bump))
  || 'auto-next-patch' }}
  )

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.1). Leave empty to auto-increment from package.json."
        required: false
        type: string
      bump:
        description: "Bump type when version is empty (patch=1.0.9→1.0.10, minor=1.0.9→1.1.0, major=1.0.9→2.0.0)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

env:
  # Opt into Node.js 22 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify electron release checksums
        run: pnpm run verify:electron-release-checksums

  package-audit:
    runs-on: ubuntu-latest
    needs:
      - verify
    outputs:
      package_tarball: ${{ steps.pack.outputs.package_tarball }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: extract_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set package version (tag trigger)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          else
            echo "Version already at $VERSION, skipping"
          fi

      - name: Set package version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            CURRENT=$(node -p "require('./package.json').version")
            if [ "$CURRENT" != "$INPUT_VERSION" ]; then
              npm version "$INPUT_VERSION" --no-git-tag-version
            else
              echo "package.json already at $INPUT_VERSION, skipping npm version"
            fi
          else
            npm version "$INPUT_BUMP" --no-git-tag-version
          fi

      - name: Set runtime target to production
        run: npm pkg set muggleConfig.runtimeTargetDefault=production

      - name: Fail on stale mcp folder references
        run: |
          node <<'NODE'
          const fs = require("fs");
          const files = ["package.json", "pnpm-lock.yaml"];
          for (const file of files) {
            const text = fs.readFileSync(file, "utf-8");
            if (text.includes("file:packages/mcp\"") || text.includes("link:packages/mcp\"") || text.includes("\"packages/mcp\"")) {
              throw new Error(`Found stale packages/mcp reference in ${file}`);
            }
          }
          NODE

      - name: Pack npm package
        id: pack
        run: |
          npm pkg delete scripts.prepare
          npm pack --json > pack-result.json
          PACKAGE_TARBALL=$(node -e "const output=require('./pack-result.json');if(!Array.isArray(output)||output.length!==1){throw new Error('Unexpected npm pack output');}process.stdout.write(output[0].filename);")
          echo "package_tarball=$PACKAGE_TARBALL" >> "$GITHUB_OUTPUT"
          echo "PACKAGE_TARBALL=$PACKAGE_TARBALL" >> "$GITHUB_ENV"

      - name: Validate package contents
        run: |
          node <<'NODE'
          const cp = require("child_process");
          const fs = require("fs");
          const tarball = process.env.PACKAGE_TARBALL;
          const listing = cp.execSync(`tar -tf ${tarball}`, { encoding: "utf-8" }).split("\n").filter(Boolean);
          const required = ["package/dist/cli.js", "package/bin/muggle.js", "package/scripts/postinstall.mjs", "package/plugin/.claude-plugin/plugin.json", "package/plugin/.cursor-plugin/plugin.json"];
          for (const entry of required) {
            if (!listing.includes(entry)) {
              throw new Error(`Missing ${entry} in ${tarball}`);
            }
          }
          const cliBin = fs.readFileSync("bin/muggle.js", "utf-8");
          if (!cliBin.includes("../dist/cli.js")) {
            throw new Error("bin/muggle.js must import ../dist/cli.js");
          }
          NODE

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.package_tarball }}
          if-no-files-found: error

  smoke-install:
    needs:
      - package-audit
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Install tarball globally
        shell: bash
        run: |
          PACKAGE_TARBALL="${{ needs.package-audit.outputs.package_tarball }}"
          npm install -g "./${PACKAGE_TARBALL}"

      - name: Verify CLI is executable
        shell: bash
        run: |
          muggle --version
          muggle doctor

  # Publishes with secrets from Environment `npm-publish` — see top-of-file note
  # when renaming this workflow or the workflow display name.
  publish:
    runs-on: ubuntu-latest
    needs:
      - package-audit
      - smoke-install
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # REQUIRED: keep this step. Bundled npm is often 10.x; trusted publishing
      # needs npm CLI >= 11.5.1. Use Corepack—`npm install -g npm` is unreliable on
      # Node 22+ runners (see job failures on "Upgrade npm" with exit 1).
      - name: Activate npm 11 for trusted publishing (Corepack)
        run: |
          corepack enable
          corepack prepare npm@11.5.1 --activate
          npm --version

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Publish to npm (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ needs.package-audit.outputs.package_tarball }}" --access public --provenance

  # TODO: Add publish-mcp-registry job when mcp-publisher CLI is publicly available.
  # The official MCP registry (modelcontextprotocol.io) is in preview and the CLI
  # tooling is not yet distributed via npm. Until then, publish manually:
  #   mcp-publisher login github
  #   mcp-publisher publish

  notify-on-failure:
    runs-on: ubuntu-latest
    needs:
      - verify
      - package-audit
      - smoke-install
      - publish
    if: failure()
    steps:
      - name: Notify failure
        run: echo "Works publish failed. Check the workflow logs."
