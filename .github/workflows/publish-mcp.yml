name: Publish MCP to npm

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.1). Leave empty to auto-increment from package.json."
        required: false
        type: string
      bump:
        description: "Bump type when version is empty (patch=1.0.9→1.0.10, minor=1.0.9→1.1.0, major=1.0.9→2.0.0)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

env:
  # Opt into Node.js 22 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Use environment for secrets isolation
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # Required for npm provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: extract_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version (tag trigger)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version ${{ steps.extract_version.outputs.version }} --no-git-tag-version

      - name: Update package.json version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            npm version ${{ inputs.version }} --no-git-tag-version
          else
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi

      - name: Update package.json version (merge trigger)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: npm version patch --no-git-tag-version

      - name: Set published package runtime target to production
        run: npm pkg set muggleConfig.runtimeTargetDefault=production

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish to npm (with provenance)
        run: npm publish --access public --provenance

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: publish
    if: failure()
    steps:
      - name: Notify failure
        run: echo "MCP publish failed. Check the workflow logs."
