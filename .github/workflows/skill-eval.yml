name: Skill Evals

# Blocking on every PR to master: the gate eval (behavioral preference-gate
# contract) and the routing eval (skill descriptions route the right queries).
# Both are LLM-driven, so the per-PR routing run is scoped to the skills the PR
# touches; the full 391-query routing sweep runs nightly and on demand.
#
# The `run-full-eval` label forces the full gate + routing suite on any PR — even
# one that changes only runtime and touches no skill/gate file (which the change
# detection would skip). The on-demand lever for de-risking a refactor that alters
# how skills are delivered but not their definitions.
on:
  pull_request:
    branches: [master]
    # Re-declaring the defaults keeps opened/synchronize/reopened; `labeled` lets
    # the run-full-eval label force the full suite (each job's scope step reads it).
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      gate_runs:
        description: "skill-gate-eval: runs per scenario"
        default: "10"
      routing_runs:
        description: "skill-routing-eval: runs per query"
        default: "3"

concurrency:
  group: skill-eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Post the eval results back to the PR as a sticky comment.
  pull-requests: write

jobs:
  skill-gate-eval:
    runs-on: ubuntu-latest
    # LLM-driven and fully sequential: every gate × every scenario × GATE_RUNS
    # real Claude reps (~1 min each). 45 min cancelled healthy sweeps mid-gate;
    # match the sibling skill-routing-eval budget so a full run can finish.
    timeout-minutes: 180
    env:
      # Subscription auth, not a pay-per-use API key. Generate with
      # `claude setup-token` and store as the CLAUDE_CODE_OAUTH_TOKEN secret.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GATE_RUNS: ${{ inputs.gate_runs || '10' }}
      MUGGLE_BRAIN_DIR: ${{ github.workspace }}/muggle-ai-brain
      # Fresh, writable config dir for the headless Claude Code CLI (same as
      # skill-routing-eval) — avoids first-run state in an unwritable HOME.
      CLAUDE_CONFIG_DIR: ${{ github.workspace }}/.cc-config
    steps:
      # Fail fast with a clear reason if setup is incomplete, rather than a
      # cryptic git-auth error deep in the scenario-repo checkout.
      - name: Require secrets
        env:
          BRAIN_REPO_TOKEN: ${{ secrets.BRAIN_REPO_TOKEN }}
        run: |
          : "${CLAUDE_CODE_OAUTH_TOKEN:?set the CLAUDE_CODE_OAUTH_TOKEN repo secret (run \`claude setup-token\`) to run skill evals}"
          : "${BRAIN_REPO_TOKEN:?set the BRAIN_REPO_TOKEN repo secret (read access to multiplex-ai/muggle-ai-brain)}"

      - name: Checkout works
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The gate suite is LLM-driven and slow. On a PR, scope it to what the diff
      # can actually affect. A gate runs the skill's body under its configured
      # `model:`, so gate behavior shifts when either the gate content OR the
      # model changes:
      #   - harness / preference-gates / any non-SKILL.md skill file, or a
      #     non-`model:` SKILL.md line → full suite (scope unknown).
      #   - ONLY the `model:` line changed → the gate still runs, but scoped to
      #     that skill: a cheaper model may mishandle the contract, so its gate
      #     must re-run under the new model — while unrelated gates need not.
      #   - docs-only / nothing skill-relevant → skip.
      # `skills` is the scoped list (empty = full suite). Non-PR events run full.
      - name: Determine scope
        id: scope
        env:
          RUN_FULL_EVAL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-eval') }}
        run: |
          set -euo pipefail
          # The run-full-eval label runs the whole gate suite regardless of what
          # the PR changed — the change detection below skips runtime-only PRs.
          if [ "$RUN_FULL_EVAL" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "Full gate sweep (run-full-eval label)"
            exit 0
          fi
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "Full gate sweep (event: ${{ github.event_name }})"
            exit 0
          fi
          git fetch --no-tags origin "${{ github.base_ref }}"
          base="origin/${{ github.base_ref }}"
          full=false
          model_only=""
          if git diff --name-only "$base...HEAD" -- internal/skill-gate-eval/ | grep -q .; then
            full=true
          else
            for s in $(git diff --name-only "$base...HEAD" -- plugin/skills/ | awk -F/ 'NF>=4{print $3}' | sort -u); do
              # any non-SKILL.md file in the skill dir is gate-relevant with unknown scope
              if git diff --name-only "$base...HEAD" -- "plugin/skills/$s/" | grep -qvE '/SKILL\.md$'; then full=true; break; fi
              d="$(git diff -U0 "$base...HEAD" -- "plugin/skills/$s/SKILL.md" | grep -E '^[+-]' | grep -vE '^(\+\+\+|---) ' || true)"
              [ -z "$d" ] && continue
              # a non-`model:` SKILL.md line (gate body) changed → full suite
              if printf '%s\n' "$d" | grep -qvE '^[+-]model:[[:space:]]'; then full=true; break; fi
              # only the `model:` line changed → re-run this skill's gate, scoped
              if printf '%s\n' "$d" | grep -qE '^[+-]model:[[:space:]]'; then model_only="${model_only:+$model_only,}$s"; fi
            done
          fi
          if $full; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "Gate-relevant changes detected — running full gate suite."
          elif [ -n "$model_only" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skills=$model_only" >> "$GITHUB_OUTPUT"
            echo "Model-only change — gate eval scoped to: $model_only"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No gate-relevant changes (docs) — gate eval not required."
          fi

      # Scenario data lives in a separate private repo; needs a token with read
      # access to multiplex-ai/muggle-ai-brain (the default GITHUB_TOKEN cannot
      # read other private repos).
      - name: Checkout scenario data (muggle-ai-brain)
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: multiplex-ai/muggle-ai-brain
          token: ${{ secrets.BRAIN_REPO_TOKEN }}
          path: muggle-ai-brain

      - name: Setup Node.js
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.scope.outputs.should_run == 'true'
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        if: steps.scope.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      # The gate harness drives @anthropic-ai/claude-agent-sdk's query(), which
      # needs the Claude Code CLI; the SDK's bundled native binary isn't usable
      # on the runner. Install it (as skill-routing-eval does) and let the run
      # step point the SDK at it. Auth stays on the subscription token.
      - name: Install Claude Code CLI
        if: steps.scope.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # Prove the subscription token authenticates before the agent-SDK harness
      # runs, via the same `claude -p` path skill-routing-eval relies on. A
      # rejected CLAUDE_CODE_OAUTH_TOKEN and an SDK/harness fault otherwise both
      # surface only as the SDK's opaque "process exited with code 1"; this
      # separates them and fails fast with an actionable message.
      - name: Preflight — confirm subscription auth
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          mkdir -p "$CLAUDE_CONFIG_DIR"
          if out="$(claude -p 'Respond with exactly: OK' --max-turns 1 2>&1)"; then
            echo "auth preflight ok"
          else
            echo "::error::Subscription auth preflight failed — CLAUDE_CODE_OAUTH_TOKEN is rejected. Regenerate with \`claude setup-token\` and re-set the secret (no trailing newline)." >&2
            echo "claude output:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: Run skill-gate evals (every gate in the scenario repo)
        if: steps.scope.outputs.should_run == 'true'
        env:
          # Empty = full suite; a comma-list scopes the run to those skills' gates
          # (a model-only PR — see Determine scope).
          SCOPE_SKILLS: ${{ steps.scope.outputs.skills }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Keep a stray API key from outranking the subscription token (it would bill the API).
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          # The SDK can't find its bundled native binary on the runner; point it
          # at the globally-installed CLI instead.
          export CLAUDE_CODE_EXECUTABLE="$(command -v claude)"
          mkdir -p "$CLAUDE_CONFIG_DIR"
          fail=0
          total=0
          ran=0
          for scenarios in "$MUGGLE_BRAIN_DIR"/eval/skill-gate-eval/*/scenarios.json; do
            total=$((total + 1))
            gate="$(basename "$(dirname "$scenarios")")"
            skill="$(node -e "process.stdout.write(require(process.argv[1]).skill)" "$scenarios")"
            if [ -n "$SCOPE_SKILLS" ]; then
              case ",$SCOPE_SKILLS," in
                *",$skill,"*) : ;;
                *) echo "skip gate=$gate (skill=$skill not in scope: $SCOPE_SKILLS)"; continue ;;
              esac
            fi
            echo "::group::gate=$gate skill=$skill runs=$GATE_RUNS"
            if pnpm exec tsx internal/skill-gate-eval/src/run.ts \
                 --gate "$gate" --skill "$skill" --runs "$GATE_RUNS" \
                 --brain-dir "$MUGGLE_BRAIN_DIR"; then
              echo "PASS $gate"
            else
              echo "FAIL $gate"
              fail=1
            fi
            ran=$((ran + 1))
            echo "::endgroup::"
          done
          if [ "$total" -eq 0 ]; then
            echo "No scenarios.json found under $MUGGLE_BRAIN_DIR/eval/skill-gate-eval" >&2
            exit 1
          fi
          if [ "$ran" -eq 0 ]; then
            echo "Scoped to [$SCOPE_SKILLS] — no matching gate scenario; nothing to run (clean pass)."
          fi
          exit "$fail"

      # Post the gate results to the job summary always, and to the PR as a
      # sticky comment on pull_request runs. `always()` so a failing gate still
      # reports which scenario/model regressed instead of just a red check.
      - name: Report gate results
        if: always() && steps.scope.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          md="$(pnpm exec tsx internal/skill-gate-eval/src/report.ts "$MUGGLE_BRAIN_DIR")"
          printf '%s\n' "$md" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            marker='<!-- muggle-skill-eval:gate -->'
            body="$(printf '%s\n%s' "$marker" "$md")"
            pr='${{ github.event.pull_request.number }}'
            repo='${{ github.repository }}'
            cid="$(gh api "repos/$repo/issues/$pr/comments" --paginate --jq "map(select(.body|startswith(\"$marker\")))|last|.id" 2>/dev/null || true)"
            if [ -n "${cid:-}" ] && [ "$cid" != "null" ]; then
              gh api -X PATCH "repos/$repo/issues/comments/$cid" -f body="$body" >/dev/null
            else
              gh api -X POST "repos/$repo/issues/$pr/comments" -f body="$body" >/dev/null
            fi
          fi

  skill-routing-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # Subscription auth, not a pay-per-use API key (see skill-gate-eval above).
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ROUTING_RUNS: ${{ inputs.routing_runs || '3' }}
      CLAUDE_CONFIG_DIR: ${{ github.workspace }}/.cc-config
      CLEAN_CWD: ${{ github.workspace }}/.clean-cwd
    steps:
      - name: Checkout works
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # On a PR, only the touched skills are evaluated (full sweep is nightly).
      # When no skill description changed, the job has nothing to gate and the
      # remaining steps are skipped — the required check still goes green.
      - name: Determine scope
        id: scope
        env:
          RUN_FULL_EVAL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-eval') }}
        run: |
          set -euo pipefail
          # The run-full-eval label runs the full 391-query sweep on any PR, even
          # one that changed no skill description (which the detection below skips).
          if [ "$RUN_FULL_EVAL" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "full=true" >> "$GITHUB_OUTPUT"
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "Full routing sweep (run-full-eval label)"
            exit 0
          fi
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "full=true" >> "$GITHUB_OUTPUT"
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "Full routing sweep (event: ${{ github.event_name }})"
            exit 0
          fi
          git fetch --no-tags origin "${{ github.base_ref }}"
          base="origin/${{ github.base_ref }}"
          # Routing depends only on a skill's frontmatter (`name` + `description`)
          # — the body (gate contracts, procedure) never reaches the router. So
          # compare just the frontmatter block, minus `model:`, between base and
          # head: a `model:`-only or body-only change leaves it identical and is
          # skipped. This is what stops a gate-body edit needlessly running (and
          # flaking) the routing eval; a description/name change still runs it.
          fm() { awk 'NR==1 && $0=="---"{f=1;next} f&&$0=="---"{exit} f{print}' | grep -vE '^model:[[:space:]]'; }
          relevant=""
          for s in $(git diff --name-only "$base...HEAD" -- 'plugin/skills/*/SKILL.md' | awk -F/ '{print $3}' | sort -u); do
            before="$(git show "$base:plugin/skills/$s/SKILL.md" 2>/dev/null | fm || true)"
            after="$(git show "HEAD:plugin/skills/$s/SKILL.md" 2>/dev/null | fm || true)"
            if [ "$before" != "$after" ]; then
              relevant="${relevant:+$relevant,}$s"
            fi
          done
          if [ -z "$relevant" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "full=false" >> "$GITHUB_OUTPUT"
            echo "No routing-relevant frontmatter changes (model:-only / body-only) — routing eval not required."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "full=false" >> "$GITHUB_OUTPUT"
            echo "skills=$relevant" >> "$GITHUB_OUTPUT"
            echo "Routing-relevant skills: $relevant"
          fi

      - name: Setup Node.js
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup Python
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Claude Code CLI
        if: steps.scope.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # Install the plugin from THIS checkout (not GitHub master) so the eval
      # tests the PR's skill descriptions. Fresh CLAUDE_CONFIG_DIR + a clean cwd
      # keep the repo's own .claude settings/skills from competing.
      - name: Install muggle plugin from this checkout
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$CLAUDE_CONFIG_DIR" "$CLEAN_CWD"
          claude plugin marketplace add "$GITHUB_WORKSPACE"
          claude plugin install muggleai@muggle-works
          claude plugin list
          claude plugin list | grep -Fq "muggleai@muggle-works" \
            || { echo "muggle plugin failed to install/enable" >&2; exit 1; }

      - name: Preflight — confirm the plugin actually routes
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          route="$(python internal/skill-routing-eval/router_eval.py \
            --probe 'test my changes before I open the PR' --repo-root "$CLEAN_CWD")"
          echo "preflight route=$route"
          # Any concrete route proves the plugin loaded and routing fired — that
          # includes short aliases (mtest, mdo, …), which are valid muggle routes
          # the probe lands on nondeterministically. Only `none`/empty means the
          # plugin failed to load or auth was rejected.
          case "$route" in
            none|"") echo "Preflight failed: got '$route'. Plugin not loaded or auth missing." >&2; exit 1 ;;
            *) echo "plugin loaded; routing works (route=$route)" ;;
          esac

      - name: Run routing eval
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          # A full sweep (nightly, dispatch, or the run-full-eval label) scores the
          # whole 391-query set at the nightly 0.95 bar — it carries known-flaky
          # tail queries. A scoped PR run demands 1.0: the skills it changed must
          # route perfectly.
          if [ "${{ steps.scope.outputs.full }}" = "true" ]; then
            python internal/skill-routing-eval/run.py \
              --all --runs "$ROUTING_RUNS" --repo-root "$CLEAN_CWD" --fail-under 0.95
          else
            python internal/skill-routing-eval/run.py \
              --skills "${{ steps.scope.outputs.skills }}" \
              --runs "$ROUTING_RUNS" --repo-root "$CLEAN_CWD" --fail-under 1.0
          fi

      # Post the routing report (reports/run/combined.md) to the job summary and,
      # on a PR, a sticky comment. `always()` so a flaked/failed sweep still
      # reports rather than leaving a bare red check.
      - name: Report routing results
        if: always() && steps.scope.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          f="internal/skill-routing-eval/reports/run/combined.md"
          if [ -f "$f" ]; then
            md="$(printf '### 🧭 Skill routing eval\n\n%s' "$(head -c 60000 "$f")")"
          else
            md="$(printf '### 🧭 Skill routing eval\n\n_No routing report produced — the run failed before writing combined.md (often the MCP-disconnect / subscription-limit flake; re-run)._')"
          fi
          printf '%s\n' "$md" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            marker='<!-- muggle-skill-eval:routing -->'
            body="$(printf '%s\n%s' "$marker" "$md")"
            pr='${{ github.event.pull_request.number }}'
            repo='${{ github.repository }}'
            cid="$(gh api "repos/$repo/issues/$pr/comments" --paginate --jq "map(select(.body|startswith(\"$marker\")))|last|.id" 2>/dev/null || true)"
            if [ -n "${cid:-}" ] && [ "$cid" != "null" ]; then
              gh api -X PATCH "repos/$repo/issues/comments/$cid" -f body="$body" >/dev/null
            else
              gh api -X POST "repos/$repo/issues/$pr/comments" -f body="$body" >/dev/null
            fi
          fi
