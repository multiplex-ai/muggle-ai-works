name: Verify Upgrade Experience for End Users

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  verify-upgrade-experience:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify compatibility contracts
        run: pnpm run verify:contracts

      - name: Verify existing-user upgrade experience
        run: pnpm run verify:upgrade-experience
